<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>拟态翻页式多媒体感想日记本</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <div class="app-shell">
      <aside class="sidebar">
        <div class="brand">
          <div class="brand-mark">记</div>
          <div>
            <h1>拟态感想日记本</h1>
            <p>照片、音乐和回忆的翻页本</p>
          </div>
        </div>

        <button id="newEntryButton" class="primary-action" type="button">新建感想</button>

        <label class="field compact">
          <span>搜索</span>
          <input id="searchInput" type="search" placeholder="标题、正文、标签、日期" />
        </label>

        <section class="calendar-card">
          <div class="calendar-head">
            <button id="prevMonthButton" class="icon-button" type="button" title="上个月">‹</button>
            <strong id="monthLabel"></strong>
            <button id="nextMonthButton" class="icon-button" type="button" title="下个月">›</button>
          </div>
          <div class="weekdays">
            <span>一</span><span>二</span><span>三</span><span>四</span><span>五</span><span>六</span><span>日</span>
          </div>
          <div id="calendarGrid" class="calendar-grid"></div>
          <p class="calendar-tip">点日期：切换当天记录；没有记录时会把当前日记改到这一天。</p>
        </section>

        <section class="toc-card">
          <div class="section-title">
            <h2>目录</h2>
            <span id="entryCount">0 篇</span>
          </div>
          <div id="entryList" class="entry-list"></div>
        </section>
      </aside>

      <main class="workspace">
        <header class="topbar">
          <div>
            <p class="eyebrow">当前日记</p>
            <h2 id="currentEntryTitle">还没有记录</h2>
          </div>
          <div class="top-actions">
            <button id="soundToggleButton" class="ghost" type="button">翻页声音：开</button>
            <select id="soundSelect" class="compact-select" aria-label="翻页音效">
              <option value="soft">轻纸声</option>
              <option value="deep">厚纸声</option>
              <option value="crisp">清脆纸声</option>
            </select>
            <button id="backupButton" class="ghost" type="button">备份数据</button>
            <button id="deleteEntryButton" class="danger subtle" type="button">删除</button>
          </div>
        </header>

        <section id="emptyState" class="empty-state">
          <h2>翻开第一页</h2>
          <p>新建一篇感想，选择纸张背景，在光标位置插入照片和音乐。</p>
          <button id="emptyNewButton" class="primary-action" type="button">写一篇感想</button>
        </section>

        <section id="journalDesk" class="journal-desk hidden">
          <div class="book-toolbar">
            <button id="prevPageButton" class="ghost" type="button">上一页</button>
            <span id="pageLabel" class="page-pill">1 / 1</span>
            <button id="nextPageButton" class="ghost" type="button">下一页</button>
          </div>

          <div class="book-stage" id="bookStage">
            <article id="leftPage" class="paper-page left-page"></article>
            <article id="rightPage" class="paper-page right-page"></article>
            <div id="turnPage" class="turn-page"></div>
          </div>
        </section>
      </main>

      <aside id="editorPanel" class="editor-panel hidden">
        <div class="section-title">
          <h2>编辑</h2>
          <span id="saveHint">已自动保存</span>
        </div>

        <label class="field">
          <span>标题</span>
          <input id="titleInput" placeholder="这一页的名字" />
        </label>

        <div class="date-grid">
          <label class="field">
            <span>日期</span>
            <input id="dateInput" type="date" />
          </label>
          <label class="field">
            <span>时间</span>
            <input id="timeInput" type="time" />
          </label>
        </div>

        <label class="field">
          <span>标签</span>
          <input id="tagsInput" placeholder="雨天、电影、读后感" />
        </label>

        <label class="field">
          <span>页面背景</span>
          <select id="backgroundSelect">
            <option value="paper">温柔纸张</option>
            <option value="letter">复古信纸</option>
            <option value="mist">雾蓝纯色</option>
            <option value="rose">暖粉手账</option>
            <option value="night">夜色星空</option>
            <option value="photo">照片背景</option>
            <option value="rain">窗外雨声</option>
            <option value="snow">飘雪</option>
            <option value="leaves">落叶</option>
          </select>
        </label>

        <label id="photoBackgroundField" class="field hidden">
          <span>照片背景</span>
          <input id="backgroundImageInput" type="file" accept="image/*" />
        </label>

        <div class="format-bar" aria-label="文字工具">
          <button data-command="formatBlock" data-value="h2" type="button">标题</button>
          <button data-command="bold" type="button">B</button>
          <button data-command="italic" type="button">I</button>
          <button data-command="foreColor" data-value="#7a4933" type="button">色</button>
          <button data-command="insertHorizontalRule" type="button">线</button>
          <button data-command="formatBlock" data-value="blockquote" type="button">引</button>
        </div>

        <div class="insert-grid">
          <label class="insert-button">
            插入图片
            <input id="imageInput" type="file" accept="image/*,image/gif" hidden />
          </label>
          <label class="insert-button">
            插入音乐
            <input id="audioInput" type="file" accept="audio/*" hidden />
          </label>
          <label class="insert-button">
            插入视频
            <input id="videoInput" type="file" accept="video/*" hidden />
          </label>
          <button id="insertSceneButton" class="insert-button" type="button">插入动态场景</button>
          <button id="deleteSelectedButton" class="insert-button danger-lite" type="button">删除选中内容</button>
        </div>

        <div id="editor" class="rich-editor" contenteditable="true"></div>
      </aside>
    </div>

    <dialog id="sceneDialog" class="dialog">
      <form method="dialog" class="dialog-body">
        <div class="dialog-head">
          <h2>插入动态场景</h2>
          <button class="icon-button" value="cancel" type="submit">×</button>
        </div>
        <div class="scene-options">
          <button value="rain" type="button">下雨</button>
          <button value="snow" type="button">飘雪</button>
          <button value="leaves" type="button">落叶</button>
          <button value="stars" type="button">星空</button>
          <button value="candle" type="button">烛光</button>
        </div>
      </form>
    </dialog>

    <script src="app.js"></script>
  </body>
</html>
